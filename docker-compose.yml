services:
  embedeval:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./cases:/app/cases:ro
      - ./results:/app/results
    environment:
      - ZEPHYR_BASE=/opt/zephyrproject/zephyr
      - ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk-0.16.8
      - BSIM_OUT_PATH=/opt/bsim

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./cases:/app/cases:ro
      - ./results:/app/results
    environment:
      - ZEPHYR_BASE=/opt/zephyrproject/zephyr
      - ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk-0.16.8
      - BSIM_OUT_PATH=/opt/bsim
    deploy:
      replicas: 4
    entrypoint: ["uv", "run", "embedeval"]
