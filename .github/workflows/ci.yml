name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/ -v --tb=short

  expert-pack-drift:
    name: Expert Pack Coverage Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      # Fails if LLM-EMBEDDED-FAILURE-FACTORS.md was edited without
      # regenerating src/embedeval/context_packs/expert-coverage.md.
      # Local fix: `uv run python scripts/build_expert_pack.py`.
      - run: uv run python scripts/build_expert_pack.py --check
